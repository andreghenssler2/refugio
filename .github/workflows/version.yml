name: Atualizar Build

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:

  version:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4

      - name: Atualizar Build
        run: php mod/scripts/build.php

      - name: Commit
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          git add mod/version.php

          git diff --cached --quiet || git commit -m "Versao atualizada automaticamente"

      - name: Push
        run: git push